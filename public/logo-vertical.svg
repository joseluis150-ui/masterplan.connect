<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <title>MasterPlan Connect — Logo Vertical Positivo</title>

  <!-- Isotipo centrado arriba -->
  <defs>
    <mask id="slash-mask-v1">
      <rect width="220" height="220" fill="white"/>
      <polygon points="195,25 220,50 100,170 75,145" fill="black"/>
      <polygon points="145,75 170,100 50,220 25,195" fill="black"/>
    </mask>
  </defs>
  <g transform="translate(190, 40)">
    <g mask="url(#slash-mask-v1)">
      <circle cx="110" cy="110" r="92" fill="#0A0A0A"/>
      <circle cx="110" cy="110" r="50" fill="#FFFFFF"/>
    </g>
    <polygon points="195,25 210,25 90,145 75,145" fill="#E87722"/>
    <polygon points="145,75 160,75 40,195 25,195" fill="#E87722"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="370" text-anchor="middle" font-family="Work Sans, Helvetica, Arial, sans-serif" font-weight="800" font-size="76" letter-spacing="-2.5" fill="#0A0A0A">MasterPlan<tspan fill="#E87722">.</tspan></text>

  <!-- Sub: Connect -->
  <text x="300" y="430" text-anchor="middle" font-family="Work Sans, Helvetica, Arial, sans-serif" font-weight="400" font-size="38" letter-spacing="-0.5" fill="#737373">Connect</text>
</svg>
